<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction | St. Lazarus' Church</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e2937 0%, #0f172a 100%);
            min-height: 100vh;
            overflow: hidden;
            color: white;
        }

        .construction-container {
            position: relative;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Background Particles */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Crane Animation */
        .crane-container {
            position: relative;
            width: 300px;
            height: 200px;
            margin-bottom: 50px;
            z-index: 1;
        }

        .crane-base {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 20px;
            background: #f59e0b;
            border-radius: 4px;
        }

        .crane-tower {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 15px;
            height: 150px;
            background: linear-gradient(90deg, #d97706, #f59e0b, #d97706);
            border-radius: 3px;
        }

        .crane-arm {
            position: absolute;
            bottom: 160px;
            left: 50%;
            transform-origin: left center;
            transform: translateX(0%);
            width: 180px;
            height: 10px;
            background: linear-gradient(180deg, #d97706, #f59e0b);
            border-radius: 5px;
            animation: craneSwing 4s ease-in-out infinite;
        }

        .crane-cable {
            position: absolute;
            top: 100%;
            left: 90%;
            width: 3px;
            height: 60px;
            background: #64748b;
            animation: cableSwing 4s ease-in-out infinite;
        }

        .crane-hook {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 15px;
            border: 3px solid #94a3b8;
            border-top: none;
            border-radius: 0 0 10px 10px;
            animation: hookSwing 4s ease-in-out infinite;
        }

        .hardhat {
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 25px;
            background: #ef4444;
            border-radius: 50% 50% 20% 20%;
            animation: hardhatBounce 4s ease-in-out infinite;
        }

        @keyframes craneSwing {

            0%,
            100% {
                transform: rotate(-5deg);
            }

            50% {
                transform: rotate(5deg);
            }
        }

        @keyframes cableSwing {

            0%,
            100% {
                transform: rotate(5deg);
            }

            50% {
                transform: rotate(-5deg);
            }
        }

        @keyframes hookSwing {

            0%,
            100% {
                transform: translateX(-50%) rotate(-5deg);
            }

            50% {
                transform: translateX(-50%) rotate(5deg);
            }
        }

        @keyframes hardhatBounce {

            0%,
            100% {
                transform: translateX(-50%) translateY(0);
            }

            50% {
                transform: translateX(-50%) translateY(-20px);
            }
        }

        /* Spinning gears */
        .gears-container {
            position: absolute;
            top: 10%;
            left: 10%;
            z-index: 0;
        }

        .gear {
            width: 60px;
            height: 60px;
            position: absolute;
            background: #475569;
            border-radius: 50%;
            animation: gearRotate 8s linear infinite;
        }

        .gear::before {
            content: '';
            position: absolute;
            width: 25px;
            height: 25px;
            background: #1e2937;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .gear::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-conic-gradient(from 0deg,
                    transparent 0deg 15deg,
                    #64748b 15deg 25deg);
            border-radius: 50%;
        }

        .gear:nth-child(2) {
            width: 40px;
            height: 40px;
            left: 45px;
            top: 35px;
            animation-direction: reverse;
            animation-duration: 5s;
        }

        .gear:nth-child(3) {
            width: 30px;
            height: 30px;
            left: 80px;
            top: 10px;
            animation-duration: 6s;
        }

        @keyframes gearRotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        /* Wrench floating */
        .wrench {
            position: absolute;
            top: 15%;
            right: 15%;
            font-size: 40px;
            animation: wrenchFloat 3s ease-in-out infinite;
            z-index: 0;
            opacity: 0.6;
        }

        @keyframes wrenchFloat {

            0%,
            100% {
                transform: translateY(0) rotate(-10deg);
            }

            50% {
                transform: translateY(-20px) rotate(10deg);
            }
        }

        /* Content */
        .content {
            text-align: center;
            z-index: 1;
            position: relative;
        }

        .warning-icon {
            font-size: 80px;
            margin-bottom: 30px;
            animation: pulse 2s ease-in-out infinite;
            color: #f59e0b;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.1);
                opacity: 0.8;
            }
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #f59e0b, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }

        .subtitle {
            font-size: 1.3rem;
            color: #94a3b8;
            margin-bottom: 40px;
            max-width: 500px;
            line-height: 1.6;
        }

        /* Progress bar */
        .progress-container {
            width: 100%;
            max-width: 400px;
            margin: 0 auto 50px;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #334155;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
            border-radius: 10px;
            width: 0%;
            animation: progressFill 8s ease-in-out infinite;
        }

        @keyframes progressFill {
            0% {
                width: 0%;
            }

            80% {
                width: 75%;
            }

            100% {
                width: 75%;
            }
        }

        .progress-text {
            margin-top: 15px;
            color: #64748b;
            font-size: 0.9rem;
        }

        /* Loading dots */
        .loading-dots {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: #f59e0b;
            border-radius: 50%;
            animation: dotBounce 1.4s ease-in-out infinite both;
        }

        .dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        .dot:nth-child(3) {
            animation-delay: 0s;
        }

        @keyframes dotBounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
            }
        }

        /* Home button */
        .home-btn {
            display: inline-block;
            margin-top: 40px;
            padding: 15px 40px;
            background: linear-gradient(135deg, #b91c1c, #dc2626);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(185, 28, 28, 0.3);
        }

        .home-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(185, 28, 28, 0.4);
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.2rem;
            }

            .subtitle {
                font-size: 1.1rem;
            }

            .crane-container {
                transform: scale(0.8);
            }

            .gears-container {
                opacity: 0.5;
            }

            .wrench {
                opacity: 0.3;
            }
        }
    </style>
</head>

<body>
    <div class="construction-container">
        <!-- Background particles -->
        <div class="particles" id="particles"></div>

        <!-- Floating wrench -->
        <div class="wrench">🔧</div>

        <!-- Spinning gears -->
        <div class="gears-container">
            <div class="gear"></div>
            <div class="gear"></div>
            <div class="gear"></div>
        </div>

        <!-- Crane animation -->
        <div class="crane-container">
            <div class="crane-base"></div>
            <div class="crane-tower"></div>
            <div class="crane-arm">
                <div class="crane-cable">
                    <div class="crane-hook"></div>
                </div>
            </div>
            <div class="hardhat"></div>
        </div>

        <!-- Main content -->
        <div class="content">
            <div class="warning-icon">⚠️</div>
            <h1>Under Construction</h1>
            <p class="subtitle">This site is currently undergoing development. Please wait until a new update is
                deployed. We're working hard to bring you an improved experience.</p>

            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
                <p class="progress-text">Work in progress... 58.09%</p>
            </div>

            <div class="loading-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>

            <a href="index.html" class="home-btn">← Return to Homepage</a>
        </div>
    </div>

    <script>
        // Create floating particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 30;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        // Initialize everything
        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
        });
    </script>
</body>

</html>
